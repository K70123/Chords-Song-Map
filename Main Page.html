<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chords & Song Map</title>
    <link rel="stylesheet" href="Main-style.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="menu">
        <button class="menuBtn" id="hideShowBtn" onclick="hideShow()">☰</button>
        <button class="menuBtn" id="mainBtn" onclick="home()">🏠︎</button>
        <button class="menuBtn" id="darkBtn" onclick="darkMode()">☾⋆</button>
        <button class="menuBtn" id="manualBtn" onclick="manual()">📖</button>
    </div>
    
    <div class="leftContainer"></div>

    <div class="rightContainer"></div>

    <div class="songMapContainer">
        <div class="songMapTitle">Song Map</div>
        <ul class="songMapList">
            <li class="songMapPart"></li>
        </ul>
        <button class="addPartBtn">+</button>
    </div>

    <button id="undoBtn" class= "undoRedoBtn" onclick="undo()">↺ Undo</button>
    <button id="redoBtn" class= "undoRedoBtn" onclick="redo()">↻ Redo</button>

    <script src="Main-script.js"></script>
</body>
