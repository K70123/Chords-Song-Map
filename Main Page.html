<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chords & Song Map</title>
    <link rel="stylesheet" href="Main-style.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="menu">
        <button class="menuBtn" id="hideShowBtn" onclick="hideShow()">☰</button>
        <button class="menuBtn" id="mainBtn" onclick="home()">🏠︎</button>
        <button class="menuBtn" id="darkBtn" onclick="darkMode()">☾⋆</button>
        <button class="menuBtn" id="manualBtn" onclick="manual()">📖</button>
    </div>
    <div class="leftContainer">
        <div class="liveContainer">
            <div class="liveTitle">Live Songs ▼</div>
            <ul class="dropdown-menu">
                <li class="songName" >Song 1</li>
                <li class="songName">Song 2</li>
                <li class="songName">Song 3</li>
            </ul>
        </div>
        <div class="artistContainer">
            <div class="artistName">Artist ▼</div>
            <ul class="dropdown-menu">
                <li class="songName">Song 1</li>
                <li class="songName">Song 2</li>
                <li class="songName">Song 3</li>
            </ul>
        </div>
    </div>
    <div class="rightContainer">
        <div class="title">Song Title</div>
        <div class="keyContainer">
            <button class="key">A</button>
            <button class="key">A#</button>
            <button class="key">B♭</button>
            <button class="key">B</button>
            <button class="key">C</button>
            <button class="key">C#</button>
            <button class="key">D♭</button>
            <button class="key">D</button>
            <button class="key">D#</button>
            <button class="key">E♭</button>
            <button class="key">E</button>
            <button class="key">F</button>
            <button class="key">F#</button>
            <button class="key">G♭</button>
            <button class="key">G</button>
            <button class="key">G#</button>
            <button class="key">A♭</button>
            <button class="key">Num</button>
        </div>
        <div class="chordsContainer">
            <span>Original Key:
                <span class="originalKey">G</span>
            </span>
            <span>
                Beats Per Bar:
                <span>4</span>
                Chords Per Row:
                <span>4</span>
            </span>
            <div class="songSectionContainer">
                <div class="sectionTitle">Intro</div>
                <div class="chords">
                    <div class="chord-row">
                        <span class="line">|</span>
                        <span class="chord">• • • •</span>
                        <span class="line">|</span>
                    </div>
                    <div class="editBtn">
                        <button class="addChordBtn">+</button>
                        <button class="deleteSectionBtn">🗑️</button>
                    </div>
                </div>
                <hr>
                <button class="addChordSectionBtn">+</button>
            </div>
        </div>
        <div class="notesContainer">
            <div class="notesTitle">Notes</div>
            <textarea class="notesArea" placeholder="Add any notes about the song here..."></textarea>
        </div>
    </div>
    <div class="songMapContainer">
        <div class="songMapTitle">Song Map</div>
        <ul class="songMapList">
            <li class="songMapPart"></li>
        </ul>
        <button class="addPartBtn">+</button>
    </div>

    <button id="undoBtn" class= "undoRedoBtn" onclick="undo()">↺ Undo</button>
    <button id="redoBtn" class= "undoRedoBtn" onclick="redo()">↻ Redo</button>

    <script src="Main-script.js"></script>
</body>
